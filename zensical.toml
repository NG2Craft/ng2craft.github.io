[project]

# Project Information
site_name = "NG2Craft"
site_url = "https://ng2craft.github.io/"
site_author = "quentintyr"
site_description = "Documentation for our Minecraft Mods build by the NG2Craft Team."
copyright = "&copy; 2025 NG2Craft"

# Repository
repo_name = "NG2Craft/Homepage"
repo_url = "https://github.com/NG2Craft"

nav = [
    { "Home" = "index.md" },
    { "Mods" = "mods/index.md" },
    { "Datapacks" = "datapacks/index.md" },
    { "Resource Packs" = "resourcepacks/index.md" },
    { "Discussions" = [
        "discussions/global.md",
        "discussions/questions.md",
        "discussions/suggestions.md",
    ] },
    { "FAQ" = "faq/index.md" },
    { "About" = [
        "about/index.md",
        "about/installation.md",
        "about/support.md",
        "about/licensing.md",
    ] },
]

# Theme Configuration
[project.theme]
# Navigation
language = "en"
favicon = "assets/logo.png"
logo = "assets/logo.png"
font.text = "Roboto"
font.code = "Roboto Mono"
custom_dir = "overrides"

# Features
features = ["navigation.indexes", "navigation.tabs"]

# Color Palette - Dark Mode
[[project.theme.palette]]
scheme = "slate"
primary = "black"
accent = "indigo"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/NG2Craft"
name = "NG2Craft on Github"

[[project.extra.social]]
icon = "fontawesome/brands/discord"
link = "https://dsc.gg/lescouade-net"

[[project.extra.social]]
icon = "modrinth/modrinth"
link = "https://github.com/NG2Craft"
